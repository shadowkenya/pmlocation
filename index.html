<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Geo-Map Pro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        :root {
            --neon: #00f2ff;
            --bg: #05070a;
            --glass: rgba(10, 15, 25, 0.9);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Initial Centered Button */
        .launch-container {
            text-align: center;
            z-index: 10;
        }

        .btn-launch {
            background: linear-gradient(45deg, #0062ff, #00f2ff);
            color: white;
            padding: 20px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-launch:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.6);
        }

        /* Full Screen Overlay */
        #mapOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 100;
            display: none; /* Hidden by default */
            flex-direction: column;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(1.1); }
            to { opacity: 1; transform: scale(1); }
        }

        #map {
            flex-grow: 1;
            width: 100%;
            background: #000;
        }

        /* UI Elements on Map */
        .map-controls {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .info-panel {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            max-width: 70%;
            pointer-events: auto;
        }

        .close-btn {
            background: rgba(255, 50, 50, 0.9);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .close-btn:hover { background: #ff0000; transform: rotate(90deg); }

        .landmark-title { color: var(--neon); font-weight: bold; margin: 0; font-size: 1.1rem; }
        .address-text { font-size: 0.85rem; opacity: 0.8; margin-top: 5px; }

        /* Scanning Animation */
        .scanner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border: 2px solid var(--neon);
            border-radius: 50%;
            pointer-events: none;
            display: none;
            z-index: 1001;
        }
        .scanner::after {
            content: "";
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 2px solid var(--neon);
            border-radius: 50%;
            animation: ping 1.5s infinite;
        }
        @keyframes ping { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
    </style>
</head>
<body>

    <div class="launch-container">
        <button class="btn-launch" onclick="initLiveTracker()">Identify My Location</button>
        <p style="color: #4a5568; margin-top: 15px; font-size: 0.9rem;">Requires GPS Permission</p>
    </div>

    <div id="mapOverlay">
        <div class="map-controls">
            <div class="info-panel" id="infoPanel">
                <p class="landmark-title" id="landmarkName">Initializing Satellites...</p>
                <p class="address-text" id="fullAddress">Waiting for precision fix...</p>
            </div>
            <button class="close-btn" onclick="closeTracker()">&times;</button>
        </div>
        
        <div id="map"></div>
        <div class="scanner" id="scanner"></div>
    </div>

<script>
    let map;
    let marker;

    function initLiveTracker() {
        const overlay = document.getElementById('mapOverlay');
        const scanner = document.getElementById('scanner');
        
        overlay.style.display = 'flex';
        scanner.style.display = 'block';

        if (!navigator.geolocation) {
            alert("Your browser does not support Geolocation.");
            return;
        }

        // Initialize Map if not already created
        if (!map) {
            map = L.map('map', { zoomControl: false }).setView([0, 0], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© CartoDB'
            }).addTo(map);
        }

        navigator.geolocation.getCurrentPosition(
            async (position) => {
                const { latitude, longitude } = position.coords;
                
                // Close-up zoom for landmarks
                map.setView([latitude, longitude], 17);
                scanner.style.display = 'none';

                // Add or move marker
                if (marker) map.removeLayer(marker);
                marker = L.circleMarker([latitude, longitude], {
                    radius: 12,
                    fillColor: "#00f2ff",
                    color: "#fff",
                    weight: 3,
                    fillOpacity: 1
                }).addTo(map);

                // Fetch Exact Landmark/Place Name
                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${latitude}&lon=${longitude}`);
                    const data = await response.json();
                    
                    // Priority: Place Name > Road > Suburb
                    const name = data.name || data.address.amenity || data.address.building || data.address.road || "Pinned Location";
                    
                    document.getElementById('landmarkName').innerText = `📍 ${name}`;
                    document.getElementById('fullAddress').innerText = data.display_name;
                    marker.bindPopup(`<b>Exact Location Found</b>`).openPopup();
                } catch (err) {
                    document.getElementById('landmarkName').innerText = "Location Identified";
                    document.getElementById('fullAddress').innerText = `${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
                }
            },
            (error) => {
                alert("Permission Denied: Please allow location access.");
                closeTracker();
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    function closeTracker() {
        document.getElementById('mapOverlay').style.display = 'none';
        document.getElementById('scanner').style.display = 'none';
    }
</script>

</body>
</html>
