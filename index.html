<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Precision Tracker</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        :root {
            --neon: #00f2ff;
            --accent: #7000ff;
            --glass: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

        body, html { width: 100%; height: 100%; background: #020617; overflow: hidden; color: white; }

        /* --- BEAUTIFIED ENTRY SCREEN --- */
        .hero {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100%; position: relative;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        /* Animated Background Nodes */
        .hero::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 50px 50px; transform: rotate(15deg);
            animation: moveGrid 60s linear infinite; z-index: 0;
        }
        @keyframes moveGrid { from { transform: rotate(15deg) translateY(0); } to { transform: rotate(15deg) translateY(-500px); } }

        .glass-card {
            z-index: 10; padding: 40px; border-radius: 30px;
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--border); text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn-launch {
            background: linear-gradient(135deg, var(--accent), var(--neon));
            color: white; padding: 18px 40px; border: none; border-radius: 15px;
            font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; position: relative; overflow: hidden;
            transition: all 0.3s ease; box-shadow: 0 0 20px rgba(112, 0, 255, 0.4);
        }
        .btn-launch:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 0 40px rgba(0, 242, 255, 0.6); }

        /* --- FULL SCREEN LIVE MAP UI --- */
        #trackerUI { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 100; flex-direction: column; }
        #map { flex-grow: 1; width: 100%; }

        /* HUD Overlay */
        .hud-top {
            position: absolute; top: 15px; left: 15px; right: 15px; z-index: 1000;
            display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none;
        }

        .location-panel {
            background: var(--glass); backdrop-filter: blur(10px); width: 320px;
            padding: 20px; border-radius: 20px; border: 1px solid var(--border); pointer-events: auto;
        }

        .detail-row { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.75rem; color: #94a3b8; }
        .town-tag { background: rgba(0, 242, 255, 0.1); color: var(--neon); padding: 2px 8px; border-radius: 4px; font-weight: bold; }

        .btn-nav {
            display: block; width: 100%; margin-top: 15px; padding: 10px;
            background: #ffffff10; border: 1px solid var(--border); color: var(--neon);
            text-decoration: none; text-align: center; border-radius: 10px; font-weight: bold; font-size: 0.8rem;
        }
        .btn-nav:hover { background: var(--neon); color: #000; }

        .close-x {
            background: #ef4444; color: white; border: none; width: 40px; height: 40px;
            border-radius: 12px; font-size: 20px; cursor: pointer; pointer-events: auto;
        }
    </style>
</head>
<body>

    <div class="hero" id="entryScreen">
        <div class="glass-card">
            <h1 style="margin-bottom: 10px; font-size: 2rem;">Precision Tracker</h1>
            <p style="color: #94a3b8; margin-bottom: 30px;">Live Geospatial Satellite Uplink</p>
            <button class="btn-launch" onclick="launchTracker()">Initialize Uplink</button>
        </div>
    </div>

    <div id="trackerUI">
        <div class="hud-top">
            <div class="location-panel">
                <div style="font-size: 0.65rem; color: var(--neon); letter-spacing: 2px; margin-bottom: 5px;">📍 TARGET IDENTIFIED</div>
                <h2 id="landmark" style="font-size: 1.2rem; margin-bottom: 4px;">Locating...</h2>
                <p id="fullAddress" style="font-size: 0.8rem; opacity: 0.7; height: 35px; overflow: hidden;"></p>
                
                <hr style="border: 0; border-top: 1px solid var(--border); margin: 12px 0;">
                
                <div class="detail-row"><span>Region:</span> <span id="region" class="town-tag">---</span></div>
                <div class="detail-row"><span>Nearest Town:</span> <span id="nearestTown" class="town-tag">---</span></div>
                
                <a href="#" id="googleMapsBtn" target="_blank" class="btn-nav">GET DIRECTIONS</a>
            </div>
            
            <button class="close-x" onclick="location.reload()">&times;</button>
        </div>

        <div id="map"></div>
    </div>

<script>
    let map, marker, circle, watchId;

    function launchTracker() {
        document.getElementById('entryScreen').style.display = 'none';
        document.getElementById('trackerUI').style.display = 'flex';
        
        // Initialize Stealth Dark Map
        map = L.map('map', { zoomControl: false }).setView([0, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© Carto'
        }).addTo(map);

        if (navigator.geolocation) {
            watchId = navigator.geolocation.watchPosition(updateTracker, handleError, {
                enableHighAccuracy: true,
                maximumAge: 0
            });
        }
    }

    async function updateTracker(pos) {
        const { latitude, longitude, accuracy } = pos.coords;
        const latlng = [latitude, longitude];

        // Map Visuals
        if (!marker) {
            marker = L.circleMarker(latlng, { radius: 10, color: '#fff', fillColor: '#00f2ff', fillOpacity: 1, weight: 3 }).addTo(map);
            circle = L.circle(latlng, { radius: accuracy, color: '#00f2ff', fillOpacity: 0.1, weight: 1 }).addTo(map);
            map.setView(latlng, 15);
        } else {
            marker.setLatLng(latlng);
            circle.setLatLng(latlng).setRadius(accuracy);
            map.panTo(latlng);
        }

        // Directions Link
        document.getElementById('googleMapsBtn').href = `https://www.google.com/maps/dir/?api=1&destination=${latitude},${longitude}`;

        // Fetch Detailed Geo-Data
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${latitude}&lon=${longitude}`);
            const data = await res.json();
            
            // Extract Details
            const addr = data.address;
            const landmark = data.name || addr.amenity || addr.building || addr.road || "Moving Point";
            const town = addr.city || addr.town || addr.village || addr.suburb || "Local Area";
            const county = addr.county || addr.state || "Unknown Region";

            document.getElementById('landmark').innerText = landmark;
            document.getElementById('fullAddress').innerText = data.display_name;
            document.getElementById('nearestTown').innerText = town;
            document.getElementById('region').innerText = county;

        } catch (e) {
            console.log("Details fetch failed");
        }
    }

    function handleError(err) {
        alert("GPS Error: Ensure location is turned on and permissions are granted.");
    }
</script>

</body>
</html>
