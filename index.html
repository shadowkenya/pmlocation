<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Tactical Tracker</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        :root {
            --neon: #00f2ff;
            --danger: #ff3e3e;
            --glass: rgba(10, 15, 25, 0.85);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #05070a; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* Centered Entry */
        .hero { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .btn-launch {
            background: linear-gradient(45deg, #0062ff, #00f2ff);
            color: white; padding: 22px 45px; border: none; border-radius: 50px;
            font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; box-shadow: 0 0 30px rgba(0, 242, 255, 0.3); transition: 0.3s;
        }
        .btn-launch:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(0, 242, 255, 0.5); }

        /* Full Screen UI */
        #trackerUI { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 100; flex-direction: column; }
        #map { flex-grow: 1; width: 100%; background: #000; }

        /* Top Overlay */
        .top-bar {
            position: absolute; top: 20px; left: 20px; right: 20px; z-index: 1000;
            display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none;
        }
        .info-glass {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.2); padding: 15px; border-radius: 15px;
            color: white; width: 280px; pointer-events: auto;
        }
        .status-dot { height: 8px; width: 8px; background: #4ade80; border-radius: 50%; display: inline-block; margin-right: 8px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Controls */
        .side-btns { display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .circle-btn {
            width: 50px; height: 50px; border-radius: 50%; border: none;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 20px; cursor: pointer; transition: 0.2s;
        }
        .close-btn { background: var(--danger); box-shadow: 0 0 15px rgba(255, 62, 62, 0.4); }
        .recenter-btn { background: var(--neon); color: #000; box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }

        /* Coordinates Footer */
        .coords-footer {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); padding: 8px 20px; border-radius: 30px;
            color: var(--neon); font-family: monospace; font-size: 0.9rem; z-index: 1000;
            border: 1px solid var(--neon); letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="hero">
        <button class="btn-launch" onclick="startLiveTracking()">Activate Real-Time Tracker</button>
        <p style="color: #64748b; margin-top: 20px;">Precision Landmark Detection Enabled</p>
    </div>

    <div id="trackerUI">
        <div class="top-bar">
            <div class="info-glass">
                <div style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; margin-bottom: 5px;">
                    <span class="status-dot"></span>Live Tracking Active
                </div>
                <div id="landmark" style="font-weight: 800; font-size: 1.1rem; color: var(--neon);">Scanning...</div>
                <div id="address" style="font-size: 0.8rem; opacity: 0.8; margin-top: 5px; height: 40px; overflow: hidden;">Acquiring Signal</div>
            </div>
            
            <div class="side-btns">
                <button class="circle-btn close-btn" onclick="stopTracking()" title="Close">&times;</button>
                <button class="circle-btn recenter-btn" onclick="toggleFollow()" id="followBtn" title="Lock Target">⊕</button>
            </div>
        </div>

        <div id="map"></div>
        <div id="coords" class="coords-footer">LAT: 0.0000 | LON: 0.0000</div>
    </div>

<script>
    let map, marker, circle, watchId;
    let followMode = true;

    function startLiveTracking() {
        document.getElementById('trackerUI').style.display = 'flex';
        
        // Initialize Map
        if (!map) {
            map = L.map('map', { zoomControl: false }).setView([0, 0], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© CartoDB'
            }).addTo(map);
        }

        if (navigator.geolocation) {
            // THE "REAL" TRACKER: watchPosition updates every time the device moves
            watchId = navigator.geolocation.watchPosition(updatePosition, handleError, {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 5000
            });
        } else {
            alert("Geolocation not supported.");
        }
    }

    async function updatePosition(position) {
        const { latitude, longitude, accuracy } = position.coords;
        const latlng = [latitude, longitude];

        // Update Coordinates Display
        document.getElementById('coords').innerText = `LAT: ${latitude.toFixed(5)} | LON: ${longitude.toFixed(5)}`;

        // Update Map Visuals
        if (!marker) {
            marker = L.circleMarker(latlng, { radius: 10, color: '#fff', fillColor: '#00f2ff', fillOpacity: 1, weight: 3 }).addTo(map);
            circle = L.circle(latlng, { radius: accuracy, color: '#00f2ff', fillOpacity: 0.1, weight: 1 }).addTo(map);
        } else {
            marker.setLatLng(latlng);
            circle.setLatLng(latlng).setRadius(accuracy);
        }

        if (followMode) {
            map.setView(latlng, 18);
        }

        // Fetch Landmark Name
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${latitude}&lon=${longitude}`);
            const data = await res.json();
            const name = data.name || data.address.amenity || data.address.building || data.address.road || "On the move";
            document.getElementById('landmark').innerText = `📍 ${name}`;
            document.getElementById('address').innerText = data.display_name;
        } catch (e) {
            document.getElementById('landmark').innerText = "Target Locked";
        }
    }

    function toggleFollow() {
        followMode = !followMode;
        const btn = document.getElementById('followBtn');
        btn.style.background = followMode ? 'var(--neon)' : '#334155';
        btn.style.color = followMode ? '#000' : '#fff';
    }

    function stopTracking() {
        if (watchId) navigator.geolocation.clearWatch(watchId);
        document.getElementById('trackerUI').style.display = 'none';
        location.reload(); // Hard reset for clean exit
    }

    function handleError(err) {
        console.warn(`ERROR(${err.code}): ${err.message}`);
        if (err.code === 1) alert("Please enable GPS permissions.");
    }
</script>

</body>
</html>
