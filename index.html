<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Geo-Tracker Pro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        :root {
            --neon-blue: #00f2ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background: #0a0e14; /* Deep space dark */
            font-family: 'Inter', system-ui, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Tech Background Grid */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        .main-panel {
            width: 90%;
            max-width: 600px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        #map {
            height: 350px;
            width: 100%;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: #111;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .controls {
            margin-top: 20px;
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #0062ff, #00f2ff);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        .info-box {
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 15px;
            display: none;
            border-left: 4px solid var(--neon-blue);
        }

        .landmark-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }

        .full-address {
            font-size: 0.85rem;
            color: #a1a1aa;
            line-height: 1.4;
        }

        /* Pulse Loader */
        .loader {
            display: none;
            text-align: center;
            padding: 10px;
            font-size: 0.9rem;
            color: var(--neon-blue);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="main-panel">
    <div class="header">
        <h1>Precision Tracker</h1>
        <div id="signal" style="font-size: 0.7rem; color: #4ade80;">● SYSTEM ONLINE</div>
    </div>

    <div id="map"></div>

    <div class="controls">
        <div id="loader" class="loader">SCANNING GEOSPATIAL SATELLITES...</div>
        <button id="locateBtn" class="btn-primary" onclick="startTracking()">Identify Landmark</button>
        
        <div id="infoBox" class="info-box">
            <div id="landmark" class="landmark-name">Determining Location...</div>
            <div id="address" class="full-address">Fetching precise coordinates...</div>
        </div>
    </div>
</div>

<script>
    let map = L.map('map', { zoomControl: false }).setView([0, 0], 2);
    
    // Tech-style Dark Map Layer
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    async function startTracking() {
        const btn = document.getElementById('locateBtn');
        const loader = document.getElementById('loader');
        const infoBox = document.getElementById('infoBox');
        
        btn.style.display = 'none';
        loader.style.display = 'block';

        if (!navigator.geolocation) {
            alert("Geolocation not supported");
            return;
        }

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const { latitude, longitude, accuracy } = pos.coords;
            
            // Move Map
            map.setView([latitude, longitude], 18); // Zoom in close for landmarks
            
            // Add custom neon marker
            const marker = L.circleMarker([latitude, longitude], {
                radius: 10,
                fillColor: "#00f2ff",
                color: "#fff",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map);

            // Fetch Landmark Data (Nominatim)
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${latitude}&lon=${longitude}`);
                const data = await response.json();
                
                loader.style.display = 'none';
                infoBox.style.display = 'block';

                // prioritize landmark name (building, shop, or point of interest)
                const landmark = data.name || data.address.amenity || data.address.building || data.address.road || "Unknown Landmark";
                
                document.getElementById('landmark').innerText = landmark;
                document.getElementById('address').innerText = data.display_name;
                
                marker.bindPopup(`<b>Target Identified:</b><br>${landmark}`).openPopup();

            } catch (err) {
                loader.style.display = 'none';
                infoBox.style.display = 'block';
                document.getElementById('landmark').innerText = "Coordinates Found";
                document.getElementById('address').innerText = `${latitude.toFixed(6)}, ${longitude.toFixed(6)}`;
            }

        }, (err) => {
            alert("Permission Denied or Timeout");
            btn.style.display = 'block';
            loader.style.display = 'none';
        }, {
            enableHighAccuracy: true,
            timeout: 10000
        });
    }
</script>

</body>
</html>
