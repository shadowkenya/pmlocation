<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Speed Location Finder</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }

        #map {
            height: 300px;
            width: 100%;
            border-radius: 12px;
            margin-top: 1rem;
            display: none; /* Hidden until location found */
            border: 1px solid #e2e8f0;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease, background 0.2s;
        }

        button:active { transform: scale(0.98); }

        #status {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #64748b;
        }

        #address {
            margin-top: 1rem;
            font-size: 0.85rem;
            line-height: 1.4;
            color: #334155;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        /* Speed Optimization: Pre-loading animation */
        .pulse {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Live Location Finder</h1>
    
    <button id="locateBtn">Find My Location</button>
    
    <div id="status"></div>
    <div id="map"></div>
    <div id="address"></div>
    
    <button id="resetBtn" style="display:none; margin-top:1rem; background:#64748b;">Locate Again</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    const locateBtn = document.getElementById('locateBtn');
    const resetBtn = document.getElementById('resetBtn');
    const status = document.getElementById('status');
    const mapDiv = document.getElementById('map');
    const addressDiv = document.getElementById('address');
    
    let map;

    locateBtn.addEventListener('click', () => {
        if (!navigator.geolocation) {
            status.textContent = "Geolocation is not supported by your browser";
            return;
        }

        // UI Update for Speed Perception
        locateBtn.style.display = 'none';
        status.innerHTML = '<span class="pulse">Accessing Satellites...</span>';

        const geoOptions = {
            enableHighAccuracy: true,
            timeout: 8000,
            maximumAge: 0 // Do not use cached data for "Live" accuracy
        };

        navigator.geolocation.getCurrentPosition(success, error, geoOptions);
    });

    function success(position) {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;

        status.textContent = "Location Found!";
        mapDiv.style.display = 'block';
        resetBtn.style.display = 'inline-block';

        // Initialize Map immediately
        if (!map) {
            map = L.map('map').setView([lat, lng], 16);
        } else {
            map.setView([lat, lng], 16);
        }

        // Optimized tile loading
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OSM'
        }).addTo(map);

        L.marker([lat, lng]).addTo(map)
            .bindPopup('You are here')
            .openPopup();

        // Background fetch for address (Doesn't block the map display)
        fetchAddress(lat, lng);
    }

    async function fetchAddress(lat, lng) {
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
            const data = await response.json();
            addressDiv.style.display = 'block';
            addressDiv.innerHTML = `<strong>Address:</strong><br>${data.display_name}`;
        } catch (err) {
            addressDiv.innerHTML = `<strong>Coordinates:</strong> ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
        }
    }

    function error(err) {
        status.textContent = `Error: ${err.message}`;
        locateBtn.style.display = 'inline-block';
    }

    resetBtn.addEventListener('click', () => location.reload());
</script>

</body>
</html>
