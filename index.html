<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Location Finder</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <link rel="stylesheet" href="./style.css">
    
    <style>
        /* Ensuring the map has dimensions immediately */
        #map { 
            height: 400px; 
            width: 100%; 
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .loading-spinner {
            display: none;
            color: #555;
            font-style: italic;
        }
    </style>
</head>
<body>
    
    <div class="main">
        <div class="container">
            <h1>User Location Finder</h1>

            <button id="findLocation">Find My Location</button>
            <p id="status" class="loading-spinner">Searching for satellites...</p>

            <div class="location-container" id="results" style="display: none;">
                <div id="map"></div>
                <div id="address"></div>
                <button onclick="location.reload()">Locate Again</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="./script.js"></script>   
</body>
</html>
